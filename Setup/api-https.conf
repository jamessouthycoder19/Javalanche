<VirtualHost *:8000>
    ServerName api.javalanche.net

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.javalanche.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.javalanche.net/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://localhost:7000/
    ProxyPassReverse / http://localhost:7000/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>