<VirtualHost *:443>
        DocumentRoot "/var/www/html"
        ServerName javalanche.net


        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/javalanche.net/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/javalanche.net/privkey.pem

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>